<!-- chatgt generated navbar -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theatre Show - Dark Stage Edition</title>

<style>
/* ===== RESET leading whitespace ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== BODY THEME ===== */
body{
    background-color:#0d0d0d;
}

/* ===== NAVBAR ===== */
nav{
    background:#000;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    /* z-index:1000; */
    border-bottom:2px solid #b30000;
}

/* ===== LOGO SECTION ===== */
.logo{
    display:flex;
    flex-direction:column;
    color:white;
}

.logo h1{
    color:#ff1a1a;
    font-size:26px;
    letter-spacing:2px;
}

.logo span{
    font-size:14px;
    color:#ccc;
}

.logo small{
    font-size:11px;
    color:#ff4d4d;
}

/* ===== NAV LINKS ===== */
.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links li a{
    text-decoration:none;
    color:white;
    font-size:15px;
    letter-spacing:1px;
    transition:0.3s ease;
    padding:8px 0;
    position:relative;
}

/* Red underline hover */
.nav-links li a::after{
    content:'';
    position:absolute;
    left:0;
    bottom:-3px;
    width:0;
    height:2px;
    background:#ff1a1a;
    transition:0.3s;
}

.nav-links li a:hover{
    color:#ff1a1a;
}

.nav-links li a:hover::after{
    width:100%;
}

/* ===== HAMBURGER ===== */
.menu-toggle{
    display:none;
}

.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.hamburger span{
    background:white;
    height:3px;
    width:25px;
    margin:4px 0;
    transition:0.3s;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){

    .nav-links{
        position:absolute;
        top:100%;
        left:0;
        width:100%;
        background:#111;
        flex-direction:column;
        align-items:center;
        max-height:0;
        overflow:hidden;
        transition:0.4s ease;
        border-top:1px solid #b30000;
    }

    .nav-links li{
        margin:15px 0;
    }

    .menu-toggle:checked ~ .nav-links{
        max-height:600px;
        padding:20px 0;
    }

    .hamburger{
        display:flex;
    }
}
</style>
</head>

<body>

<nav>
    <!-- Logo -->
    <div class="logo">
        <h1>TS</h1>
        <span>Theatre Show</span>
        <small>Dark Stage Edition</small>
    </div>

    <!-- Hidden Checkbox -->
    <input type="checkbox" id="menu" class="menu-toggle">

    <!-- Hamburger -->
    <label for="menu" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <!-- Nav Links -->
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Shows</a></li>
        <li><a href="#">Upcoming</a></li>
        <li><a href="#">Theatre Speaks</a></li>
        <li><a href="#">Auditoriums</a></li>
        <li><a href="#">Artists</a></li>
        <li><a href="#">Awards</a></li>
        <li><a href="#">Magazines</a></li>
        <li><a href="#">Feedback</a></li>
        <li><a href="#">Queries</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>
