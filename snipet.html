<!DOCTYPE html>
<html>
<head>
    <title>Theatre Show Slider</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* body styling */
        body{
            margin:0px;
            padding:0px;
            background-color:black;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* carousel main container */
        .carousel{
            width:100%;
            height:auto;
        }

        /* each slide */
        .carousel-item{
            height:600px;
            width:100%;
            position:relative;
            background-size:cover;
            background-repeat:no-repeat;
            background-position:center;
        }

        /* dark overlay on image */
        .carousel-item::before{
            content:"";
            position:absolute;
            top:0px;
            left:0px;
            height:100%;
            width:100%;
            background-color:rgba(0,0,0,0.6);
        }

        /* caption styling */
        .carousel-caption{
            position:absolute;
            bottom:150px;
            z-index:10;
        }

        .carousel-caption h1{
            font-size:45px;
            color:red;
            font-weight:bold;
            text-transform:uppercase;
            letter-spacing:2px;
        }

        .carousel-caption p{
            font-size:18px;
            color:white;
            margin-top:15px;
            margin-bottom:25px;
        }

        /* first button */
        .btn1{
            background-color:red;
            color:white;
            border:none;
            
            padding:10px 25px;
            margin-right:10px;
            border-radius:50px;
        }

        .btn1:hover{
            background-color:darkred;
            color:white;
        }

        /* second button */
        .btn2{
            background-color:transparent;
            color:red;
            border:2px solid red;
            padding:10px 25px;
            border-radius:50px;
        }

        .btn2:hover{
            background-color:red;
            color:white;
        }

        /* responsive text */
        @media(max-width:768px){

            .carousel-item{
                height:450px;
            }

            .carousel-caption h1{
                font-size:25px;
            }

            .carousel-caption p{
                font-size:14px;
            }

        }

    </style>
</head>

<body>

<!-- Slider Start -->
<div id="mySlider" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

    <!-- indicators -->
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#mySlider" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#mySlider" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#mySlider" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">

        <!-- Slide 1 -->
        <div class="carousel-item active" style="background-image:url('https://images.unsplash.com/photo-1503095396549-807759245b35');">
            <div class="carousel-caption text-center">
                <h1>Welcome To Theatre Show</h1>
                <p>Experience live performances in Dark Stage Edition.</p>
                <button class="btn1">Book Now</button>
                <button class="btn2">Learn More</button>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="carousel-item" style="background-image:url('https://images.unsplash.com/photo-1497032205916-ac775f0649ae');">
            <div class="carousel-caption text-center">
                <h1>Upcoming Events</h1>
                <p>Check out our upcoming drama and stage performances.</p>
                <button class="btn1">View Shows</button>
                <button class="btn2">Artists</button>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="carousel-item" style="background-image:url('https://images.unsplash.com/photo-1515165562835-c4c94e8e18aa');">
            <div class="carousel-caption text-center">
                <h1>Awards & Recognition</h1>
                <p>Celebrating excellence in theatre and performance arts.</p>
                <button class="btn1">Awards</button>
                <button class="btn2">Magazines</button>
            </div>
        </div>

    </div>

    <!-- controls -->
    <button class="carousel-control-prev" type="button" data-bs-target="#mySlider" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#mySlider" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>

</div>
<!-- Slider End -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
