<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            display: flex;
            flex-direction: column;
            width: 350px;
            height: 250px;
            border-radius: 12px;
            overflow: hidden;
        }
        .card img{
            width: 100%;
            height: 50%;
            object-fit: cover;
        }
        .card-text{
            display: flex;
            /* flex-direction: column; */
            justify-content: space-between;
             padding: 5px;
             background-color: #f0f0f0;
        }
        .card-text h3{
            margin-left: 10px;
            margin-bottom: -10px;
        }
        
         .card-text a{
            text-decoration: none;
            color: black;
             font-weight: bold;
             margin-left: 5px;
             margin-top: 100px;
         }
         .card-text a:hover{
            text-decoration: underline;
         }
         .card-text p{
            width: 180px;
             /* margin-top: 5px; */
                /* margin-bottom: 5px;
                margin-left: 10px;
                 margin-right: 10px; */
                font-size: 14px;
            }
    </style>
</head>
<body>
    <div class="card">
        <img src="./assets/37635237.jpg" alt="">
        <div class="card-text">
            <div >
            <h3>Lorem, ipsum.</h3>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.</p>
            </div>
            <div>
                <a href="">Go somewhere → </a>
            </div>
        </div>
    </div>
</body>
</html>
