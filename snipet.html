<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Card</title>
<style>
    body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    position:relative;
    width:400px;
    height:300px;
    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* hidden text */
.card-text{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    opacity:0;
    transition:0.4s;
}

/* hover effect */
.card:hover .card-text{
    opacity:1;
}
</style>
</head>
<body>

<div class="card">
    <img src="https://picsum.photos/400/300" alt="card image">
    <div class="card-text">
        <h3>Theatre Show</h3>
        <p>Experience the magic of live performance.</p>
    </div>
</div>
